<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Happy Birthday! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        /* Confetti Animation */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            pointer-events: none;
        }

        /* Main Content */
        h1 {
            font-size: 4rem;
            color: white;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        }

        .friend-name {
            font-size: 3rem;
            color: #ffd700;
            font-weight: bold;
            margin: 20px 0;
            animation: pulse 2s infinite;
        }

        .birthday-card {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 20px;
            padding: 40px;
            margin: 30px 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.8s ease-out;
        }

        .birthday-card p {
            font-size: 1.5rem;
            color: #333;
            margin: 15px 0;
            font-weight: bold;
        }

        .cake {
            font-size: 5rem;
            animation: wiggle 0.5s infinite;
            margin: 20px 0;
        }

        .balloons {
            font-size: 3rem;
            animation: float 3s infinite ease-in-out;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .balloon {
            animation: float 3s infinite ease-in-out;
        }

        .balloon:nth-child(1) { animation-delay: 0s; }
        .balloon:nth-child(2) { animation-delay: 0.5s; }
        .balloon:nth-child(3) { animation-delay: 1s; }
        .balloon:nth-child(4) { animation-delay: 1.5s; }

        .message {
            font-size: 1.8rem;
            color: white;
            margin: 30px 0;
            line-height: 1.6;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
        }

        .sparkles {
            font-size: 2rem;
            display: inline-block;
            animation: spin 2s linear infinite;
        }

        .button-group {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(-1px);
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .heart {
            color: #ff1744;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 HAPPY BIRTHDAY! 🎉</h1>
        
        <div class="balloons">
            <div class="balloon">🎈</div>
            <div class="balloon">🎈</div>
            <div class="balloon">🎈</div>
            <div class="balloon">🎈</div>
        </div>

        <div class="friend-name" id="friendName">
            [Your Friend's Name]
        </div>

        <div class="cake">🎂</div>

        <div class="birthday-card">
            <p>🌟 Another year older, another year wiser 🌟</p>
            <p>Hope your day is as amazing as you are!</p>
        </div>

        <div class="message">
            <span class="heart">❤️</span>
            <p>May your day be filled with:</p>
            <p>✨ Cake & Laughter ✨</p>
            <p>✨ Friends & Fun ✨</p>
            <p>✨ Dreams & Joy ✨</p>
            <span class="heart">❤️</span>
        </div>

        <div class="sparkles">✨</div>

        <div class="button-group">
            <button onclick="celebrateBirthday()">🎊 CELEBRATE! 🎊</button>
            <button onclick="playMusic()">🎵 PLAY MUSIC 🎵</button>
            <button onclick="sendMessage()">💌 SEND MESSAGE 💌</button>
        </div>
    </div>

    <audio id="birthdayMusic" src="https://www.soundjay.com/misc/bell-ringing-01.mp3"></audio>

    <script>
        // Generate confetti on page load
        window.addEventListener('load', () => {
            generateConfetti();
        });

        function generateConfetti() {
            const colors = ['#ff6b6b', '#ffd700', '#00d4ff', '#00ff88', '#ff00ff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `confettiFall ${Math.random() * 3 + 2}s linear forwards`;
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 5000);
            }
        }

        function celebrateBirthday() {
            generateConfetti();
            alert('🎉 HAPPY BIRTHDAY! 🎉\n\nYou deserve the best day ever! 🎂');
        }

        function playMusic() {
            const audio = document.getElementById('birthdayMusic');
            audio.play().catch(() => alert('🎵 Music ready to play!'));
        }

        function sendMessage() {
            const message = prompt('Write a birthday message for your friend:');
            if (message) {
                alert(`💌 Message saved:\n\n"${message}"\n\nSend it to them! 💕`);
            }
        }

        // Change the friend's name
        function setFriendName(name) {
            document.getElementById('friendName').textContent = name;
        }

        // Example: setFriendName('Sarah'); // Uncomment and change the name
    </script>

</body>
</html>
